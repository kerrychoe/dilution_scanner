name: Daily Dilution Scan

on:
  schedule:
    - cron: "15 12 * * *"
  workflow_dispatch:
    inputs:
      start_date:
        description: "Optional start date (YYYY-MM-DD, UTC). If blank, defaults to yesterday."
        required: false
        default: ""
      end_date:
        description: "Optional end date (YYYY-MM-DD, UTC). If blank, defaults to yesterday."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  run-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run scanner
        env:
          START_DATE: ${{ github.event.inputs.start_date }}
          END_DATE: ${{ github.event.inputs.end_date }}

          MASSIVE_FLOAT_URL_TEMPLATE: "https://api.massive.com/stocks/vX/float?ticker={ticker}&limit=100&sort=ticker.asc"
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
        run: |
          python -m dilution_scanner

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dilution_outputs.zip
          path: output/**
          if-no-files-found: error

      - name: Commit updated persistent lists
        run: |
          set -e

          # ticker-only master (pruned)
          if [ -f output/dilution_tickers_all.csv ]; then
            cp output/dilution_tickers_all.csv dilution_tickers_all.csv
          fi

          # verbose master (pruned + stateful)
          if [ -f output/dilution_tickers_all_verbose.csv ]; then
            cp output/dilution_tickers_all_verbose.csv dilution_tickers_all_verbose.csv
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add dilution_tickers_all.csv dilution_tickers_all_verbose.csv

          git diff --cached --quiet && echo "No changes to commit." && exit 0

          git commit -m "Update dilution tickers master lists (pruned)"
          git push
