name: Daily Dilution Scan

on:
  schedule:
    # Runs daily at 12:15 UTC (adjust later if you want a different time)
    - cron: "15 12 * * *"
  workflow_dispatch:
    inputs:
      start_date:
        description: "Optional start date (YYYY-MM-DD, UTC). If blank, defaults to yesterday."
        required: false
        default: ""
      end_date:
        description: "Optional end date (YYYY-MM-DD, UTC). If blank, defaults to yesterday."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  run-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run scanner
        env:
          START_DATE: ${{ github.event.inputs.start_date }}
          END_DATE: ${{ github.event.inputs.end_date }}

          # Massive float gate (NO apiKey in URL)
          MASSIVE_FLOAT_URL_TEMPLATE: "https://api.massive.com/stocks/vX/float?ticker={ticker}&limit=100&sort=ticker.asc"
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
        run: |
          python -m dilution_scanner

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dilution_outputs
          path: output/**
          if-no-files-found: error

      - name: Commit updated master list
        run: |
          if [ -f output/dilution_tickers_all.csv ]; then
            cp output/dilution_tickers_all.csv dilution_tickers_all.csv
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add dilution_tickers_all.csv
            git diff --cached --quiet && echo "No changes to commit." && exit 0
            git commit -m "Update dilution_tickers_all.csv"
            git push
          else
            echo "output/dilution_tickers_all.csv not found; nothing to commit."
          fi
